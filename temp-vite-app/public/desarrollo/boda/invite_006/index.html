<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Invitación 006</title>
  <meta name="description" content="Modelo de invitación 006 de Save Your Date">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--paper:#fbfaf7;--ink:#292824;--accent:#a48758;--serif:'Cormorant Garamond',serif;--sans:'Montserrat',sans-serif}
    *,*::before,*::after{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;overflow-x:hidden;background:var(--paper) url('assets/paper-texture.webp') repeat;color:var(--ink);font-family:var(--sans);font-weight:300}
    .invite{width:100%;min-height:100vh}
    .section{position:relative;display:grid;min-height:100svh;padding:72px 24px;place-items:center;text-align:center}
    .content{width:min(100%,760px)}
    .eyebrow{margin:0 0 24px;font-size:10px;font-weight:500;letter-spacing:.34em;text-transform:uppercase}
    h1{margin:0;font:500 clamp(62px,13vw,138px)/.84 var(--serif);letter-spacing:.04em}
    .copy{width:min(100%,560px);margin:30px auto 0;font-size:12px;line-height:2;letter-spacing:.08em}
    .rule{width:56px;height:1px;margin:34px auto;background:var(--accent)}
  </style>
</head>
<body>
  <main class="invite">
    <section class="section">
      <div class="content">
        <p class="eyebrow">Nuevo modelo</p>
        <h1>Invitación<br>006</h1>
        <div class="rule"></div>
        <p class="copy">Base de diseño con textura de papel liviana aplicada de forma continua en toda la invitación.</p>
      </div>
    </section>
  </main>
</body>
</html>
